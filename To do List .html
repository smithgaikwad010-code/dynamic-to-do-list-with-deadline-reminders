<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}
body{
    height:100vh;
    background: linear-gradient(135deg, #c0c0c0, #e6e6e6); /* SILVER */
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:500px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    margin-bottom:20px;
    color:#444;
}
.input-row{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.input-row input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#808080;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:#666;
}
ul{
    list-style:none;
    margin-top:15px;
    max-height:300px;
    overflow-y:auto;
}
li{
    background:#f5f5f5;
    margin:10px 0;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.task{
    flex:1;
}
.completed{
    text-decoration:line-through;
    color:gray;
}
.actions span{
    margin-left:10px;
    cursor:pointer;
    font-size:18px;
}
.complete{
    color:green;
}

.delete{
    color:red;
}
</style>
</head>

<body>

<div class="container">
    <h2>📝 To-Do List</h2>

    <div class="input-row">
        <input type="text" id="taskInput" placeholder="Enter task">
        <input type="datetime-local" id="deadline">
    </div>

    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>
</div>
<script>
function addTask(){
    let taskText = document.getElementById("taskInput").value;
    let deadline = document.getElementById("deadline").value;

    if(taskText === "" || deadline === ""){
        alert("Fill all fields!");
        return;
    }
    let li = document.createElement("li");

    li.innerHTML = `
        <div class="task">
            <strong>${taskText}</strong><br>
            <small>⏰ ${new Date(deadline).toLocaleString()}</small>
        </div>
        <div class="actions">
            <span class="complete" onclick="markComplete(this)">✔</span>
            <span class="delete" onclick="deleteTask(this)">❌</span>
        </div>
    `;
    document.getElementById("taskList").appendChild(li);

    let timeDiff = new Date(deadline) - new Date();
    if(timeDiff > 0){
        setTimeout(() => {
            alert("Reminder: " + taskText);
        }, timeDiff);
    }
    document.getElementById("taskInput").value = "";
    document.getElementById("deadline").value = "";
}
function deleteTask(el){
    el.parentElement.parentElement.remove();
}
function markComplete(el){
    let task = el.parentElement.previousElementSibling;
    task.classList.toggle("completed");
}
</script>
</body>
</html>
